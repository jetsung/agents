# yaml-language-server: $schema=config.schema.json
env:
  HELLO: WORLD

# 工具平台配置
# path: 工具配置目录
# skills: skills 子目录名（相对于 path），为空则不安装
# agents: agents 配置文件名（相对于 path），为空则不安装
# source: agents 源文件名，默认为 AGENTS.md
platforms:
  claude:
    path: ~/.claude
    skills: skills
    agents: CLAUDE.md

  openclaude:
    path: ~/.openclaude
    skills: skills
    agents: CLAUDE.md

  opencode:
    path: ~/.opencode
    skills: skills
    agents: AGENTS.md

  codex:
    path: ~/.codex
    skills: skills
    agents: AGENTS.md

  qwen:
    path: ~/.qwen
    skills: skills
    agents: AGENTS.md

  codebuddy:
    path: ~/.codebuddy
    skills: skills
    agents: CODEBUDDY.md

  cline:
    path: ~/.cline
    skills: skills
    agents: CLAUDE.md

  # kilo:
  #   path: ~/.kilocode
  #   skills: skills  # kilo 可直接使用 ~/.agents/skills
  #   agents: AGENTS.md

  roo:
    path: ~/.roo
    skills: skills
    agents: AGENTS.md

  factory:
    path: ~/.factory
    skills: skills
    agents: AGENTS.md

  qoder:
    path: ~/.qoder
    skills: skills
    agents: AGENTS.md

  langcli:
    path: ~/.langcli
    skills: skills
    agents:

  gemini:
    path: ~/.gemini
    skills:
    agents: GEMINI.md

  atomcode:
    path: ~/.atomcode
    skills:
    agents: ATOMCODE.md

# 工具安装配置
# 每个 tool 条目支持以下字段:
#   id:   工具唯一标识（必填）
#   name: 显示名称（可选，默认同 id）
#   env:  该工具专属环境变量（与全局 env 合并，支持 $ENV_VAR 替换）
#   type: 资源类型（可选，默认 tool），取值:
#         - skill: 作为 skills 安装到各平台配置的 skills 子目录
#         - tool:  作为普通工具安装（默认）
#   steps: 步骤列表（必填，跨平台，详见下方命令说明）。
#         每个步骤可含可选 name 字段，用于说明该步骤。
#         支持 run 步骤类型（见下），不再使用顶层 run 字段。
#
# steps 支持的命令（每个步骤可加 name: 说明）:
#   - name: 步骤说明（可选）
#     download: 下载文件
#     - download: URL（支持 $ENV_VAR 替换）
#     - dest: 保存到临时目录的文件名（默认从 URL 提取）
#     - extract: 解压目标路径。
#                当 type 为 skill 时，缺省默认解压到 skills/ 文件夹；
#                其他情况缺省为 true（同样映射到 skills/）。
#                true/false/路径字符串
#   - name: 步骤说明（可选）
#     run: shell 命令行字符串（类似 GitHub Actions run:），直接执行
#   - unzip: 解压 zip 文件（已弃用，建议用 download + extract）
#   - copy: {src, dest}      复制文件/目录
#   - move: {src, dest}      移动文件/目录
#   - mkdir: {path}          创建目录
#   - remove: {path}         删除文件/目录
tools:
  # skills：下载 MCP 工具包，type=skill 时 extract 默认解压到 skills/ 文件夹
  # weiyun zip 内含 weiyun/ 顶层目录，解压到 skills/ 即得到 skills/weiyun/
  - id: weiyun
    name: 微云网盘 MCP 技能
    type: skill
    env:
      URL: https://cdn.addon.tencentsuite.com/static/tencent-weiyun.zip
    steps:
      - name: 下载微云网盘 MCP 技能
        download: $URL
        dest: tencent-weiyun.zip
      # 兜底：确保最终位于 skills/weiyun（应对 zip 不含顶层目录的情况）
      - name: 确保落地到 skills/weiyun
        run: test -d skills/weiyun || mv skills/* skills/weiyun 2>/dev/null || true

  # https://github.com/nextlevelbuilder/ui-ux-pro-max-skill
  - id: ui-ux-pro-max-skill
    name: UI UX Pro Max
    type: tool
    steps:
      - name: 安装 UI UX Pro Max
        run: |
          npm install -g ui-ux-pro-max-cli
      - name: 验证 UI UX Pro Max 安装状态
        run: |
          uipro --version

  # https://github.com/github/spec-kit.git
  - id: spec-kit
    name: GitHub Spec Kit
    steps:
      - name: 安装 GitHub Spec Kit
        run: |
          uv tool install specify-cli --from git+https://github.com/github/spec-kit.git
      - name: 验证 GitHub Spec Kit 安装状态
        run: |
          specify --version

  - id: qoder
    name: Qoder CLI
    steps:
      - name: 安装 Qoder CLI
        run: |
          curl -L https://qoder.com/install | bash
      - name: 验证 Qoder CLI 安装状态
        run: |
          qodercli --version

  # skills 示例：run 步骤与 download 步骤组合（run 作为 steps 内步骤类型）
  # - id: example-skill
  #   name: 示例 Skill
  #   type: skill
  #   steps:
  #     - name: 准备安装
  #       run: echo "准备安装示例 skill..."
  #     - name: 下载并解压
  #       download: https://example.com/skill.zip
  #       dest: skill.zip

# Skills 配置（嵌套结构）
# skills.channels:  skill 渠道列表，用于 skill-list / skill-show / skill-add / skill-query
#   - name:  渠道唯一标识（必填，skill-add 按此匹配）
#   - url:   仓库地址（必填）
#   - depth: skill 相对 skills/ 的嵌套层级（可选，默认 1；
#            2 表示 skills/<分类>/<skill>，需按完整路径安装）
# skills.recommended: 推荐安装来源列表（just init 安装）
#   每个条目二选一指定来源：
#     - url:  直接给出仓库地址（优先级最高）
#     - name: 引用 channels 中同名渠道的 url
#   并通过 skills: 列出要安装的具体 skill 名称
skills:
  channels:
    - name: antfu
      url: https://github.com/antfu/skills
    - name: obra
      url: https://github.com/obra/superpowers
    - name: mattpocock
      url: https://github.com/mattpocock/skills
      depth: 2
    - name: julianobarbosa
      url: https://github.com/julianobarbosa/claude-code-skills
    - name: addyosmani
      url: https://github.com/addyosmani/agent-skills
  recommended:
    - name: julianobarbosa
      skills:
        - mkdocs
    - name: myself
      url: https://git.asfd.cn/jetsung/skills.git
      skills:
        - git-commit
        - update-gh-action-version

prompts:
  - name: f
    url: https://github.com/f/prompts.chat
  - name: system_prompts_leaks
    url: https://github.com/asgeirtj/system_prompts_leaks


